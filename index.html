                    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MDO DANÇA</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>
<h1>📖 MDO DANÇA</h1>
<p>Acompanhamento anual do ministério</p>
</header>

<main>

<section class="stats">
<div>
<strong id="totalMembros">0</strong>
<span>Membros</span>
</div>

<div>
<strong id="totalVersiculos">0</strong>
<span>Total Decorados</span>
</div>
</section>

<section class="card">

<h2>➕ Novo membro</h2>

<form id="formAdd">

<input type="text" id="novoNome" placeholder="Nome do membro" required>

<button type="submit">Cadastrar</button>

</form>

</section>

<section class="card">

<h2>✍️ Lançar MDO</h2>

<input type="text" id="buscarMDO" placeholder="🔍 Buscar nome">

<form id="formMDO">

<select id="nome" required></select>

<div class="grid">

<input type="number" id="meditacao" placeholder="Meditação">

<input type="number" id="decoracao" placeholder="Decorar">

<input type="number" id="oracao" placeholder="Oração">

</div>

<button type="submit">Salvar Pontuação</button>

</form>

</section>

<section class="card">

<h2>📅 Controle de Presença</h2>

<input type="text" id="buscarPresenca" placeholder="🔍 Buscar nome">

<select id="nomePresenca"></select>

<div class="grid">

<button type="button" onclick="marcarPresenca()">Marcar Presença</button>

<button type="button" onclick="marcarFalta()">Marcar Falta</button>

</div>

</section>

<section class="card">

<h2>🏆 Ranking</h2>

<button onclick="exportarPDF()">📄 Exportar PDF do mês</button>

<div id="ranking"></div>

</section>

</main>

<script type="module" src="script.js"></script>

<div class="modal" id="modalEditar">

<div class="modal-content">

<h3>Editar Membro</h3>

<input type="text" id="editNome">

<input type="number" id="editM">

<input type="number" id="editD">

<input type="number" id="editO">

<div class="grid">

<button onclick="salvarEdicao()">Salvar</button>

<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

</div>

</body>
</html>
