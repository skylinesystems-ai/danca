<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDO DA DANÇA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>💃 MDO DA DANÇA</h1>
  <p>Acompanhamento anual do ministério</p>
</header>

<main>

  <section class="stats">
    <div>
      <strong id="totalMembros">0</strong>
      <span>Membros</span>
    </div>
    <div>
      <strong id="totalVersiculos">0</strong>
      <span>Total Geral</span>
    </div>
  </section>

  <section class="card">
    <h2>➕ Novo membro</h2>
    <form id="formAdd">
      <input type="text" id="novoNome" placeholder="Nome do membro" required>
      <button type="submit">Cadastrar</button>
    </form>
  </section>

  <section class="card">
    <h2>✍️ Lançar MDO</h2>
    <form id="formMDO">
      <select id="nome" required></select>

      <div class="grid">
        <input type="number" id="meditacao" placeholder="Meditação" min="0">
        <input type="number" id="decoracao" placeholder="Decoração" min="0">
        <input type="number" id="oracao" placeholder="Oração" min="0">
      </div>

      <button type="submit">Salvar Pontuação</button>
    </form>
  </section>

  <section class="card">
    <h2>📅 Controle de Presença</h2>
    <select id="nomePresenca"></select>
    <div class="grid">
      <button type="button" onclick="marcarPresenca()">Marcar Presença</button>
      <button type="button" onclick="marcarFalta()">Marcar Falta</button>
    </div>
  </section>

  <section class="card">
    <h2>🏆 Ranking anual</h2>
    <div id="ranking"></div>
  </section>

</main>

<script type="module" src="script.js"></script>

<div class="modal" id="modalEditar">
    <div class="modal-content">
        <h3>Editar Membro</h3>
        <input type="text" id="editNome" placeholder="Nome">
        <input type="number" id="editM" placeholder="Meditação">
        <input type="number" id="editD" placeholder="Decoração">
        <input type="number" id="editO" placeholder="Oração">
        <div class="grid">
            <button onclick="salvarEdicao()">Salvar</button>
            <button onclick="fecharModal()">Cancelar</button>
        </div>
    </div>
</div>

</body>
</html>
